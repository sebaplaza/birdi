name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "24"

      - name: Install Dependencies with pnpm
        run: |
          npm install -g pnpm
          pnpm install

      - name: Run OXLint
        run: |
          pnpm exec oxlint

      - name: Run Vitest Tests
        run: |
          pnpm exec vitest

      - name: Run Playwright E2E Tests
        run: |
          pnpm exec playwright test
