name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies with pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      - run: pnpm install

      - name: Run linter
        run: pnpm lint || true

      - name: Build project
        run: pnpm build

      - name: Run unit tests
        run: pnpm test || true

      - name: Run e2e tests
        run: pnpm test:e2e || true
